name: EPG

on:
  schedule:
    - cron: '40 */2 * * *'
  workflow_dispatch:

# 解决Node.js弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Debug - Check repository
        run: |
          pwd
          ls -la
          
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史记录，用于时间判断

      - name: Verify required files
        run: |
          if [ ! -f "files.json" ]; then
            echo "❌ ERROR: files.json not found!"
            echo "Create files.json with format:"
            echo '{
              "epg1.xml": "https://example.com/epg1.xml"
            }'
            exit 1
          fi
          
          echo "✅ files.json exists:"
          cat files.json
          
      - name: Install dependencies
        run: |
          # 更新源并安装必要工具
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            curl \
            libxml2-utils \
            file \
            gzip
          
      - name: Create epg directory
        run: mkdir -p epg
        
      - name: Download files from files.json
        env:
          DOWNLOAD_PROXY: ${{ secrets.DOWNLOAD_PROXY || '' }}
        run: |
          set -e  # 遇到错误立即退出，便于调试
          
          echo "Starting download process..."
          echo "DOWNLOAD_PROXY: ${DOWNLOAD_PROXY:-未设置}"
          
          # 读取files.json
          FILES_COUNT=$(jq '. | length' files.json)
          echo "Found $FILES_COUNT files to process"
          
          # 这里放你的下载脚本...
          # 为测试，先简化
          cat files.json | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r filename url; do
            echo "Processing: $filename -> $url"
          done
          
          echo "✅ Download step completed"
