name: monthly-cleanup-gitee

on:
  schedule:
    - cron: '0 3 1 * *'  # 每月1日凌晨3点执行（UTC时间=北京时间+8）
  workflow_dispatch:      # 允许手动触发

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      # Step 1️⃣：配置 SSH 连接 Gitee
      - name: Setup SSH for Gitee
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITEE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

      # Step 2️⃣：克隆 Gitee 仓库
      - name: Clone Gitee repository
        run: git clone git@gitee.com:taksssss/tv.git gitee-repo

      # Step 3️⃣：重建 main 分支，删除所有历史
      - name: Reset repository history
        run: |
          cd gitee-repo
          # 创建孤立分支（不含历史）
          git checkout --orphan clean
          # 保留当前文件（如果仓库为空可忽略错误）
          git add -A || echo "无文件可添加"
          git commit -m "月度清理：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          # 删除旧 main 分支并重命名
          git branch -D main || true
          git branch -m main
          # 强制推送
          git push -f origin main
          echo "✅ 清理完成并已推送至 Gitee。"

      # Step 4️⃣（可选）：发送 WeCom 通知
      - name: Send WeCom notification
        if: success()
        run: |
          TOKEN=$(curl -s "https://qyapi.weixin.qq.com/cgi-bin/gettoken?corpid=${{ secrets.WECOM_CID }}&corpsecret=${{ secrets.WECOM_SECRET }}" | grep -oP '"access_token":"\K[^"]+')
          MSG="Gitee 仓库已完成月度历史清理 ✅\n执行时间：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          curl -s -X POST "https://qyapi.weixin.qq.com/cgi-bin/message/send?access_token=$TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "touser": "'${{ secrets.WECOM_TOUID }}'",
            "msgtype": "text",
            "agentid": "'${{ secrets.WECOM_AGENT_ID }}'",
            "text": { "content": "'"$MSG"'" },
            "safe": 0
          }'
